name: build
on:
  push:
    branches: ["main"]
jobs:
 build:
   runs-on:  ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-java@v4
       with:
         java-version: 15
         distribution: temurin

      - run: mvn clean package
      - uses: actions/upload-artifacts@v4
        with:
          name: saiii
          path: target/*.war
      
    
    
