name: build
on:
  push:
    branches: ["main"]

jobs:
 Build-war
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - run: mvn clean package
    - uses: actiions/upload-artifact@v4
      with:
        name: warfile
        path: target/*.war
        
